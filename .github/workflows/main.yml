name: AI Investment Assistant

on:
  schedule:
    # 일일 리포트: 08:30 KST
    - cron: "30 8 * * *"
      timezone: "Asia/Seoul"

    # 모니터링: 평일 09:00~15:59 KST, 10분마다 실행
    # BTC 같은 24시간 자산은 별도 워크플로로 분리해도 좋습니다.
    - cron: "*/10 9-15 * * 1-5"
      timezone: "Asia/Seoul"

  workflow_dispatch:
    inputs:
      mode:
        description: "daily or monitor"
        required: false
        default: "daily"

permissions:
  contents: write

concurrency:
  group: ai-investment-assistant
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BOT_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 8 * * *" ]; then
            echo "BOT_MODE=daily" >> $GITHUB_ENV
          else
            echo "BOT_MODE=monitor" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # 선택 설정값:
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          WATCHLIST_JSON: ${{ vars.WATCHLIST_JSON }}
          ALERT_CHANGE_PCT: ${{ vars.ALERT_CHANGE_PCT }}
          REALERT_STEP_PCT: ${{ vars.REALERT_STEP_PCT }}
        run: python bot.py

      - name: Commit alert state if changed
        run: |
          if [ -n "$(git status --porcelain state/alerts.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/alerts.json
            git commit -m "Update alert state [skip ci]"
            git push
          else
            echo "No alert state changes."
          fi
