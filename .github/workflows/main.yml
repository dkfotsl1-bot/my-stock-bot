
name: AI Investment Assistant

on:
  schedule:
    - cron: "17 8 * * 1-5"
      timezone: "Asia/Seoul"

    - cron: "37 11,14 * * 1-5"
      timezone: "Asia/Seoul"

    - cron: "12 16 * * 1-5"
      timezone: "Asia/Seoul"

    - cron: "*/5 * * * *"
      timezone: "Asia/Seoul"

    # 필요하면 급등락 알림도 켤 수 있음
    # - cron: "7,27,47 9-15 * * 1-5"
    #   timezone: "Asia/Seoul"

  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 선택"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - intraday
          - aftermarket
          - commands
          - monitor

permissions:
  contents: write

concurrency:
  group: ai-investment-assistant
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BOT_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "17 8 * * 1-5" ]; then
            echo "BOT_MODE=premarket" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "37 11,14 * * 1-5" ]; then
            echo "BOT_MODE=intraday" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "12 16 * * 1-5" ]; then
            echo "BOT_MODE=aftermarket" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "*/5 * * * *" ]; then
            echo "BOT_MODE=commands" >> $GITHUB_ENV
          else
            echo "BOT_MODE=monitor" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          WATCHLIST_JSON: ${{ vars.WATCHLIST_JSON }}
          ALERT_CHANGE_PCT: ${{ vars.ALERT_CHANGE_PCT }}
          REALERT_STEP_PCT: ${{ vars.REALERT_STEP_PCT }}
          MAX_NEWS_PER_ASSET: ${{ vars.MAX_NEWS_PER_ASSET }}
          MAX_GEMINI_ASSETS_PER_RUN: ${{ vars.MAX_GEMINI_ASSETS_PER_RUN }}
          ENABLE_GEMINI_MODES: ${{ vars.ENABLE_GEMINI_MODES }}
          COMMANDS_ALLOWED_CHAT_IDS: ${{ vars.COMMANDS_ALLOWED_CHAT_IDS }}
        run: python bot.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain state/bot_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/bot_state.json
            git commit -m "Update bot state [skip ci]"
            git push
          else
            echo "No state changes."
          fi
